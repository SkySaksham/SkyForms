<!DOCTYPE html>
<html>
<head>
    <title id = "head-title">SkyForms</title>
    <link rel="stylesheet" href="./style/navBar.css">
    <link rel="stylesheet" href="./style/editor.css">
    <link rel="stylesheet" href="./style/body.css">
</head>
<body>

<div id = "nav"></div>

<div class="page">

    <div class="questionCard">

        <label class="field">
            <span>Question Title</span>
            <input
                type="text"
                placeholder="Enter your question..."
                id="title">
        </label>

        <label class="field">
            <span>Description (Optional)</span>
            <textarea
                rows="3"
                placeholder="Add a description..."
                id="description">
            </textarea>
        </label>

        <label class="field">
            <span>Question Type</span>

            <select id="type">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>
        </label>

        <label class="requiredRow">
            <input type="checkbox" id="required">
            <span>Required</span>
        </label>


        <div class="actions">
            <button class="cancelBtn">Cancel</button>
            <button class="saveBtn">Save Question</button>
        </div>

    </div>

    

</div>


 
</body>


<script  src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module">
import { getNavbar } from "./navBar.js";
const nav = document.querySelector("#nav");
nav.replaceWith(getNavbar({left:"<-Back",middle:"Add Question",right:null}));


function getLabelSpan(content = "") {
    const label = document.createElement("label");
    label.className = "field";

    const span = document.createElement("span");
    span.textContent = content;

    label.appendChild(span);
    return label;
}

function getQuestionTitle(value = "") {
    const label = getLabelSpan("Question Title");

    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Enter your question...";
    input.id = "title";
    
    input.value=value;

    label.appendChild(input);
    return label;
}

function getDescription(value = "") {
    const label = getLabelSpan("Description (Optional)");

    const textarea = document.createElement("textarea");
    textarea.rows = 3;
    textarea.placeholder = "Add a description...";
    textarea.id = "description";

    textarea.value= value;

    label.appendChild(textarea);
    return label;
}

function getQuestionType(type = "short") {
    const label = getLabelSpan("Question Type");

    const select = document.createElement("select");
    select.id = "type";

    const options = [
        ["short", "Short Answer"],
        ["paragraph", "Paragraph"],
        ["mcq", "Multiple Choice"],
        ["checkbox", "Checkboxes"],
        ["dropdown", "Dropdown"]
    ];

    options.forEach(([value, text]) => {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    });

    select.value = type;

    label.appendChild(select);
    return label;
}

function getRequiredRow(value = false) {
    const label = document.createElement("label");
    label.className = "requiredRow";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.id = "required";

    if (value) checkbox.checked = true;

    const span = document.createElement("span");
    span.textContent = "Required";

    label.append(checkbox, span);
    return label;
}

function getActions() {
    const actions = document.createElement("div");
    actions.className = "actions";

    const cancelBtn = document.createElement("button");
    cancelBtn.className = "cancelBtn";
    cancelBtn.textContent = "Cancel";

    const saveBtn = document.createElement("button");
    saveBtn.className = "saveBtn";
    saveBtn.textContent = "Save Question";

    actions.append(cancelBtn, saveBtn);
    return actions;
}

export function getQuestionEditor(content = {}) {
    const card = document.createElement("div");
    card.className = "questionCard";

    card.append(
        getQuestionTitle(content.title),
        getDescription(content.description),
        getQuestionType(content.type),
        getRequiredRow(content.required),
        getActions()
    );
        
    return card;
}



const testData = {
        id: 4,
        title: "What is your highest level of education?",
        description: null,
        type: "dropdown",
        required: true,
    };

const a = document.querySelector(".page");
a.innerHTML="";

a.appendChild(getQuestionEditor(testData));


</script>

<style>

.page{
    display : flex;
    width: 100%;
    max-width: 700px;
    height: 100%;
    background: transparent;
    margin: 10px auto 0 auto;
    min-height: 100vh;
    gap: 5px;
    padding: 12px;
    flex-direction: column;
}

.questionCard{
    background:white;
    border-radius:14px;
    padding:28px;
    display:flex;
    flex-direction:column;
    gap:16px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.field{
    display:flex;
    flex-direction:column;
    gap: 12px;
}

.field span{
    font-size:1.1rem;
    font-weight:400;
    color:Black;   
}

.field input,
.field textarea,
.field select{
    
    padding:12px 14px;
    font-size:15px;
    border:1px solid #d7d7d7;
    border-radius:8px;
    outline:none;
    transition:.2s;
    font-family:inherit;
    resize:vertical;
    background:white;
}

.field input:focus,
.field textarea:focus,
.field select:focus{
    border-color:grey;
    box-shadow: 0 0 3px rgba(0,0,0,.18);
}

.requiredRow{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:500;
}

.actions{
    display:flex;
    justify-content:flex-end;
    gap:12px;
}

.actions button{
    border:none;
    border-radius:8px;
    padding:12px 22px;
    cursor:pointer;
    font-size:15px;
    transition:.2s;
}

.cancelBtn{
    background:#ececec;
}

.cancelBtn:hover{
    background:#dddddd;
}

.saveBtn{
    background:grey;
    color:white;
}

.saveBtn:hover{
    background:black;
}


</style>

</html>
