<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyForms</title>
</head>
<body>

<div class="Lcontainer">

    <div class="Lhead">SkyForms</div>
    <div class="Lsubhead">Create, manage and share forms effortlessly.</div>

    <div class="Lshowcase">
        <div class="Lcard Lside Lleft">
            <img src="https://picsum.photos/600/338?random=1" alt="Demo">
        </div>

        <div class="Lcard Lcenter">
            <img src="https://picsum.photos/600/338?random=2" alt="Demo">
        </div>

        <div class="Lcard Lside Lright">
            <img src="https://picsum.photos/600/338?random=3" alt="Demo">
        </div>
    </div>

    <div class = "Ltext">Create your first form in seconds. Start below</div>

    <div class="Lprompt">

        <textarea
            class="LpromptInput"
            placeholder="Describe the form you want to create..."
        ></textarea>

        <button class="LsendBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 2L11 13"></path>
                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
            </svg>
        </button>

    </div>

    <div class="Lbottom">
    <span class="LbottomText">Ready to save your forms?</span>

    <button class="LgoogleBtn">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.73 1.22 9.24 3.61l6.9-6.9C35.95 2.3 30.42 0 24 0 14.64 0 6.57 5.38 2.63 13.22l8.03 6.24C12.5 13.66 17.8 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.14-3.08-.39-4.55H24v9.09h12.94c-.56 3-2.25 5.54-4.8 7.25l7.37 5.72C43.86 38.03 46.98 31.87 46.98 24.55z"/>
            <path fill="#FBBC05" d="M10.66 28.54A14.5 14.5 0 0 1 9.5 24c0-1.58.27-3.11.76-4.54l-8.03-6.24A23.95 23.95 0 0 0 0 24c0 3.87.93 7.53 2.23 10.78l8.43-6.24z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.92-2.13 15.89-5.82l-7.37-5.72c-2.05 1.38-4.67 2.2-8.52 2.2-6.2 0-11.5-4.16-13.34-9.96l-8.43 6.24C6.57 42.62 14.64 48 24 48z"/>
        </svg>

        <span>Continue with Google</span>
    </button>
    </div>


</div>
   




<style>
.Lcontainer{
    min-height : 90vh;
    width: 90vw;
    background: white;
    margin:auto;
    margin-top: 2.5vh;
    border-radius: 16px;
    display:flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 6px 12px rgba(0,0,0,.06);
}

.Lhead{
    margin-left:auto;
    margin-right: auto;
    margin-top: clamp(1rem, 6vh, 2rem);
    font-size:clamp(3rem,6vw,4rem);
    font-weight: 500;
    
}

.Lsubhead{
    margin-left:auto;
    margin-right: auto;
    margin-top: clamp(1rem, 2vh, 2rem);
    font-weight: 400;
    font-size:clamp(1rem,2.5vw,1.4rem);
   
    color: rgb(56, 56, 56);
}

.Lshowcase{
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:4rem;
    margin-top:clamp(2rem,5vh,4rem);
}

.Lcard{
    overflow:hidden;
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    transition:0.3s ease;
}

.Lcard img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.Lside{
    width:250px;
    aspect-ratio:16/9;
}

.Lcenter{
    height:250px;
    aspect-ratio:16/9;
}
.Lleft{
    transform:rotate(-4deg);
}

.Lright{
    transform:rotate(4deg);
}

.Lcard:hover{
    transform:translateY(-4px);
}

.Lleft:hover{
    transform:rotate(-4deg) translateY(-4px);
}

.Lright:hover{
    transform:rotate(4deg) translateY(-4px);
}

.Ltext {
    margin-left: auto;
    margin-right: auto;
    font-size:clamp(1rem,2.5vw,1.4rem);
    margin-top: clamp(2rem, 4vh, 4rem);

}

.Lprompt{
    width: min(850px, 90%);
    margin-left: auto;
    margin-right: auto;
    margin-top: 1.5rem;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    padding: 14px;
    background: #ecebeb;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(0,0,0,.06);
}

.LpromptInput{
    flex: 1;
    min-height: 80px;
    max-height: 120px;
    border: none;
    outline: none;
    resize: none;
    background: transparent;
    font-size: 1rem;
    font-family: inherit;
    color: #222;
    line-height: 1.5;
    overflow-y: auto;
}

.LpromptInput::placeholder{
    color: #8a8a8a;
}

.LsendBtn{
    width: 48px;
    height: 48px;

    flex-shrink: 0;

    display: flex;
    justify-content: center;
    align-items: center;

    border: none;
    border-radius: 25%;

    background: #3d3d3d;
    color: white;

    cursor: pointer;
    transition: .2s ease;
}

.LsendBtn:hover{
    background: #4f4f4f;
    transform: translateY(-2px);
}

.LsendBtn:active{
    transform: translateY(0);
}

.LsendBtn svg{
    width: 20px;
    height: 20px;
}

.Lbottom{
    width:min(850px,90%);
    margin:0.5rem auto;

    display:flex;
    justify-content: center;
    align-items:center;
    gap:6px;
}

.LbottomText{
    font-size:1rem;
    color:#444;
}

.LgoogleBtn{
    display:flex;
    align-items:center;
    gap:.75rem;
    padding:.8rem 1.2rem;
    background:#fff;
    border:1px solid #dadce0;
    border-radius:12px;

    font-family:inherit;
    font-size:.95rem;
    font-weight:500;
    color:#3c4043;

    cursor:pointer;
    transition:.2s;
}

.LgoogleBtn:hover{
    background:#f8f9fa;
    box-shadow:0 1px 3px rgba(0,0,0,.15);
}

.LgoogleBtn svg{
    flex-shrink:0;
}

@media (max-width: 768px){


    .Lshowcase{
        margin-top:5rem;
        gap:0;
    }

    .Lside{
        display:none;
    }
    .Lcenter{
        width:90%;
        max-width:420px;
        height:auto;
        aspect-ratio:16/9;
    }

    .Ltext {
        margin-left: auto;
        margin-right: auto;
        margin-top: auto;
        font-size:clamp(1rem,2.5vw,1.4rem);
    }


    .Lprompt{
        margin-top: 0.5rem;
        width:85%;
        padding:12px;
    }

    .LpromptInput{
        min-height:90px;
        font-size:.95rem;
    }

    .LpromptInput::placeholder{
        font-size:.95rem;
    }

    .LsendBtn{
        width:44px;
        height:44px;
    }

    .LsendBtn svg{
        width:18px;
        height:18px;
    }

    .Lbottom{
        width:min(850px,90%);
        margin:2.5rem auto;
        flex-direction: column;
        display:flex;
        justify-content: center;
        align-items:center;
        gap:1rem;
    }
}

body {
    background: rgb(230,230,230);
    font-family: Georgia, 'Times New Roman', Times, serif, Times, serif;
    font-weight: 400;
}
    
</style>


</body>
<script>

</script>



</html>
