<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Forms</title>
<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f3f4f6;
}

.back{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    background:white;
    width:min(90%, 560px);
    padding:64px;
    border-radius:20px;
    text-align:center;
    transform: translateY(-40px);
    box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px,
    rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
  transition: all ease-in-out 0.3s;
}

.card:hover {
  background-color: #fdfdfd;
  box-shadow: rgba(0, 0, 0, 0.09) 0px 2px 1px, rgba(0, 0, 0, 0.09) 0px 4px 2px,
    rgba(0, 0, 0, 0.09) 0px 8px 4px, rgba(0, 0, 0, 0.09) 0px 16px 8px,
    rgba(0, 0, 0, 0.09) 0px 32px 16px;
}


.header{
    font-size:3rem;
    font-weight:700;
    letter-spacing:.5px;
    color:#222;
    font-family: 'Times New Roman', Times, serif;
}

.subtitle{
    margin-top:24px;
    color:#666;
    font-size:1.1rem;
    line-height:1.7;
}

.buttons{
    display:flex;
    gap:16px;
    margin-top:56px;
}

.buttons button{
    flex:1;
    padding:16px;
    border:none;
    border-radius:10px;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
    gap : 16px;
}

.login{
    background:#f3f4f6;
    color:#333;
}

.login:hover{
    background:#e5e7eb;
}

.signup{
    background:#626263;
    color:white;
}

.signup:hover{
    background:#262626;
}


/* From Uiverse.io by alexruix */ 
.loader {
  width: 22px;
  height: 22px;
  margin: auto;
  position: relative;
}

.loader:before {
  content: '';
  width: 24px;
  height: 5px;
  background: #2c2c2c50;
  position: absolute;
  top: 60px;
  left: 0;
  border-radius: 50%;
  animation: shadow324 0.5s linear infinite;
}

.loader:after {
  content: '';
  width: 100%;
  height: 100%;
  background: #292929;
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 4px;
  animation: jump7456 0.5s linear infinite;
}

@keyframes jump7456 {
  15% {
    border-bottom-right-radius: 3px;
  }

  25% {
    transform: translateY(9px) rotate(22.5deg);
  }

  50% {
    transform: translateY(18px) scale(1, .9) rotate(45deg);
    border-bottom-right-radius: 40px;
  }

  75% {
    transform: translateY(9px) rotate(67.5deg);
  }

  100% {
    transform: translateY(0) rotate(90deg);
  }
}

@keyframes shadow324 {

  0%,
    100% {
    transform: scale(1, 1);
  }

  50% {
    transform: scale(1.2, 1);
  }
}


</style>
</head>

<body>

<div class="back">
    <div class="card animate__animated animate__zoomInUp animate__slow">
    <div class="header animate__animated animate__fadeInUp animate__delay-2s">Sky Forms</div>

    <div class="subtitle animate__animated animate__fadeIn animate__slow animate__delay-1s">
        Create, manage and share forms effortlessly.
    </div>

    <div class="buttons animate__animated animate__fadeIn animate__slow animate__delay-1s">
        <button class="login">Log In</button>
        <div class="loader"></div>
        <button class="signup">Sign Up</button>
    </div>
</div>
</div>

</body>

<script>

const subtitles = [
    "Create, manage and share forms effortlessly.",
    "Generate editable drafts with language prompts.",
    "Get analysis and summarized responses at your fingertips."
];

</script>

</html>
