<!DOCTYPE html>
<html>
<head>
    <title id = "head-title">SkyForms</title>
    <link rel="stylesheet" href="./navBar.css">
    <link rel="stylesheet" href="./body.css">
</head>
<body>

<div id = "nav"></div>
<div id = "Qcontainer" class = "Qcontainer">

    <div class = "Qcard">
        <div class="Qtitle">1. How many items do you have ? </div>
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">
            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>


            <div id = "dragHandle" class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>
        </div>
    </div>

    <div class = "Qcard">
        <div class="Qtitle">2. How many items do you have ? </div>
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">

            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>

            <div class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>
        </div>
    </div>

    

</div>
 
</body>


<script  src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module">
import { getNavbar } from "./navBar.js";
const nav = document.querySelector("#nav");
nav.replaceWith(getNavbar({left : 'back', middle : "Draft" , right:'add'}));


new Sortable(document.getElementById("Qcontainer"), {
    
    handle: ".dragHandle",
    animation: 150,
    chosenClass:"chosen",
    ghostClass: "dragging",

  
});

let Questions = [
{
    id : 21,
    title : "Hii",
    description: null,
    type : "short",
    required : true,
},
{
    id : 23,
    title : "Hii",
    description: null,
    type : "short",
    required : true,
}
];

function getDiv(className,textContent=""){
    const div = document.createElement("div");
    div.className = className;
    div.textContent = textContent; 
    return div;
}

function getQuestionType(selectedType = "short") {
    const select = document.createElement("select");
    select.className = "questionType";

    const types = {
        short: "Short Answer",
        paragraph: "Long Answer",
        mcq: "Multiple Choice",
        checkbox: "Checkbox",
        dropdown: "Dropdown"
    };

    for (const [value, text] of Object.entries(types)) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    }

    select.value = selectedType;

    return select;
}

function getDragHandle(){
    const div = document.createElement("div");
    div.className="dragHandle";
    for (let i = 0; i < 3; i++) {
        div.appendChild(document.createElement("span"));
    }
    return div;
}

function getRequired(required = false) {
    const label = document.createElement("label");
    label.className = "required";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = required;

    label.appendChild(checkbox);
    label.append("Required");

    return label;
}

function getQcard(content){
    const card = document.createElement("div");
    card.id=content.id;
    card.className="Qcard";

    card.appendChild(getDiv("Qtitle",content.title));
    card.appendChild(getDiv("Qdescription",content.description));

    const bottom = getDiv("Qbottom",null);

    bottom.appendChild (getQuestionType(content.type));
    bottom.appendChild (getDragHandle());
    bottom.appendChild (getRequired(content.required));

    card.appendChild(bottom);
    
    return card;
}

function addQuestion(content){
    const container = document.querySelector("#Qcontainer"); 
    container.appendChild(getQcard(content))
}

addQuestion(
{
    id : 21,
    title : "Hii",
    description: null,
    type : "short",
    required : true,
}
);


</script>

<style>

.Qcontainer{
    display : flex;
    width: 100%;

    margin: 10px auto 0 auto;

    flex-direction: column;
}
.Qdescription {
    font-size: 0.9rem;

    margin:5px 20px 5px 20px;

    font-weight: 400;

    font-family: Georgia, 'Times New Roman', Times, serif, Times, serif;
}
.Qtitle {
    font-size: 1.25rem;   
    font-weight: 200;
    margin:5px;
    width: 100%;
}
.Qbottom {
    display: flex;
    justify-content: space-between;
    align-items: center;

}

.questionType {
    margin : 5px;

}

    font-size: 14px;
}
.required input[type="checkbox"] {
    accent-color: gray;
}

.Qcard {
    display : flex;

    border: 1px solid rgb(235,235,235);
    background: white;
    flex-direction: column;

    margin-top: 0px;
    transition: transform 150ms ease;
}

.dragHandle {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: grab;  
}

.dragHandle span {
    width: 18px;
    height: 2px;
    background: grey;
    border-radius: 2px;
}
.dragHandle:hover span {
    background: #444;
}


.dragHandle:active {
    cursor: grabbing;
}
.dragging {
    background: #f5f5f5;
    opacity: .4;
}
.chosen {
    transform: scale(1.03);
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
}



</style>
