<!DOCTYPE html>
<html>
<head>
    <title id = "head-title">SkyForms</title>
    <link rel="stylesheet" href="./style/navBar.css">
    <link rel="stylesheet" href="./style/editor.css">
    <link rel="stylesheet" href="./style/body.css">
</head>
<body>

<div id = "nav"></div>
<div id = "Qcontainer" class = "Qcontainer">

    <div class = "Qcard">

        <div class ="Qhead">
            <div class = "Qsr">-></div>
            <div class="Qtitle"> How many items do you have ? </div>
        </div>
        
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">
            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>

            <div id = "dragHandle" class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>

        </div>

    </div>

    

</div>
 
</body>


<script  src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module">
import { getNavbar } from "./components/navBar.js";
import { renderEditor} from "./components/editor.js";




const container = document.querySelector("#Qcontainer");

const nav = document.querySelector("#nav");
nav.replaceWith(getNavbar({left : 'back', middle : "Draft" , right:'add'}));

new Sortable(document.getElementById("Qcontainer"), {
    
    handle: ".dragHandle",
    animation: 150,
    chosenClass:"chosen",
    ghostClass: "dragging",

    onEnd(evt) {
        
        updateOrder(evt);
        updateSerialDom(evt);
        
    }

});

function updateOrder(event){
    const [a] = Questions.splice(event.oldIndex,1);
    Questions.splice(event.newIndex,0,a);
}

function updateSerialDom(event){
    let a = Math.min(event.newIndex,event.oldIndex);
    let c = Math.max(event.oldIndex,event.newIndex);

    while (a<=c){
        let b = container.children[a].querySelector(".Qsr");
        b.textContent =a+1+".";
        a++;
    }
}



let Questions = [
{
    id: 1,
    title: "What is your full name?",
    description: null,
    type: "short",
    required: true,
},
{
    id: 2,
    title: "What is your email address?",
    description: "We'll use this to contact you.",
    type: "short",
    required: true,
},
{
    id: 3,
    title: "Tell us about yourself.",
    description: "A brief introduction is enough.",
    type: "paragraph",
    required: false,
},
{
    id: 4,
    title: "What is your highest level of education?",
    description: null,
    type: "dropdown",
    required: true,
}]

renderEditor(Questions);
console.log(Questions);

</script>

</style>

</html>
