<!DOCTYPE html>
<html>
<head>
    <title id = "head-title">SkyForms</title>
    <link rel="stylesheet" href="./navBar.css">
    <link rel="stylesheet" href="./editor.css">
    <link rel="stylesheet" href="./body.css">
</head>
<body>

<div id = "nav"></div>
<div id = "Qcontainer" class = "Qcontainer">

    <div class = "Qcard">

        <div class ="Qhead">
            <div class = "Qsr">-></div>
            <div class="Qtitle"> How many items do you have ? </div>
        </div>
        
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">
            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>

            <div id = "dragHandle" class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>

        </div>

    </div>

    

</div>
 
</body>


<script  src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module">
import { getNavbar } from "./navBar.js";
const nav = document.querySelector("#nav");
nav.replaceWith(getNavbar({left : 'back', middle : "Draft" , right:'add'}));

const container = document.querySelector("#Qcontainer");


new Sortable(document.getElementById("Qcontainer"), {
    
    handle: ".dragHandle",
    animation: 150,
    chosenClass:"chosen",
    ghostClass: "dragging",

  
});


function getDiv(className,textContent=""){
    const div = document.createElement("div");
    div.className = className;
    div.textContent = textContent; 
    return div;
}

function getQhead(title,serial = "->"){

    const qhead= getDiv("Qhead");
    qhead.appendChild(getDiv("Qsr",serial+"."));
    qhead.appendChild(getDiv("Qtitle",title));

    return qhead;
}

function getQuestionType(selectedType = "short") {
    const select = document.createElement("select");
    select.className = "questionType";

    const types = {
        short: "Short Answer",
        paragraph: "Long Answer",
        mcq: "Multiple Choice",
        checkbox: "Checkbox",
        dropdown: "Dropdown"
    };

    for (const [value, text] of Object.entries(types)) {
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    }

    select.value = selectedType;

    return select;
}

function getDragHandle(){
    const div = document.createElement("div");
    div.className="dragHandle";
    for (let i = 0; i < 3; i++) {
        div.appendChild(document.createElement("span"));
    }
    return div;
}

function getRequired(required = false) {
    const label = document.createElement("label");
    label.className = "required";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = required;

    label.appendChild(checkbox);
    label.append("Required");

    return label;
}

function getQcard(content,serial="->"){
    
    const card = document.createElement("div");
    card.id=content.id;
    card.className="Qcard";
    card.appendChild(getQhead(content.title,serial));
    card.appendChild(getDiv("Qdescription",content.description));

    const bottom = getDiv("Qbottom",null);

    bottom.appendChild (getQuestionType(content.type));
    bottom.appendChild (getDragHandle());
    bottom.appendChild (getRequired(content.required));

    card.appendChild(bottom);
    
    return card;
}

function addQuestion(content,serial="->"){
    container.appendChild(getQcard(content,serial));
}

function renderEditor(questions) {
    container.innerHTML = "";
    const fragment = document.createDocumentFragment();
    questions.forEach((question, index) => {
        fragment.appendChild(getQcard(question, index + 1));
    });
    container.appendChild(fragment);
}

let Questions = [
{
    id: 1,
    title: "What is your full name?",
    description: null,
    type: "short",
    required: true,
},
{
    id: 2,
    title: "What is your email address?",
    description: "We'll use this to contact you.",
    type: "short",
    required: true,
},
{
    id: 3,
    title: "Tell us about yourself.",
    description: "A brief introduction is enough.",
    type: "paragraph",
    required: false,
},
{
    id: 4,
    title: "What is your highest level of education?",
    description: null,
    type: "dropdown",
    required: true,
},
{
    id: 5,
    title: "Which programming language do you use the most?",
    description: "Select one option.",
    type: "mcq",
    required: true,
},
{
    id: 6,
    title: "Which technologies have you worked with?",
    description: "Select all that apply.",
    type: "checkbox",
    required: false,
},
{
    id: 7,
    title: "How many years of programming experience do you have?",
    description: null,
    type: "short",
    required: true,
},
{
    id: 8,
    title: "Why do you want to join our team?",
    description: "Share your motivation.",
    type: "paragraph",
    required: true,
},
{
    id: 9,
    title: "Preferred mode of work",
    description: "Remote, Hybrid, or On-site",
    type: "dropdown",
    required: true,
},
{
    id: 10,
    title: "Would you recommend our service to others?",
    description: null,
    type: "mcq",
    required: false,
}
];

renderEditor(Questions);


</script>
