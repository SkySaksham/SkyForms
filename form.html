<!DOCTYPE html>
<html>
<head>
    <title id = "head-title">SkyForms</title>
    <link rel="stylesheet" href="./navBar.css">
    <link rel="stylesheet" href="./body.css">
</head>
<body>

<div id = "nav"></div>
<div id = "Qcontainer" class = "Qcontainer">

    <div class = "Qcard">
        <div class="Qtitle">1. How many items do you have ? </div>
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">
            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>


            <div id = "dragHandle" class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>
        </div>
    </div>

    <div class = "Qcard">
        <div class="Qtitle">2. How many items do you have ? </div>
        <div class="Qdescription" > How many times do i have to tell u</div>
        <div class="Qbottom">

            <select class="questionType">
                <option value="short">Short Answer</option>
                <option value="paragraph">Paragraph</option>
                <option value="mcq">Multiple Choice</option>
                <option value="checkbox">Checkboxes</option>
                <option value="dropdown">Dropdown</option>
            </select>

            <div id = "dragHandle" class="dragHandle">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <label class="required">
                <input type="checkbox">
                Required
            </label>
        </div>
    </div>

    

</div>
 
</body>


<script  src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
<script type="module">
import { getNavbar } from "./navBar.js";
const nav = document.querySelector("#nav");
nav.replaceWith(getNavbar({left : 'back', middle : "Draft" , right:'add'}));


new Sortable(document.getElementById("Qcontainer"), {
    
    handle: ".dragHandle",
    animation: 150,
    chosenClass:"chosen",
    ghostClass: "dragging",

  
});




</script>

<style>

.Qcontainer{
    display : flex;
    width: 100%;
    max-width: 900px;
    height: 100%;
    background: white;
   
    margin: 10px auto 0 auto;
    min-height: 100vh;
    
    flex-direction: column;
}
.Qdescription {
    font-size: 0.9rem;
    background: rgb(230,230,230);
    margin:5px 20px 5px 20px;

    font-weight: 400;
    font-size: 0.8rem;
    font-family: Georgia, 'Times New Roman', Times, serif, Times, serif;
}
.Qtitle {
    font-size: 1.25rem;   
    font-weight: 200;
    margin:5px;
    width: 100%;
}
.Qbottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 10px;
    padding: 10px 0;
}

.questionType {
    margin : 5px;
    padding: 6px 10px;
    font-size: 14px;
}

.required {
    margin : 5px;
    display: flex;
    align-items: center;
    
    font-size: 14px;
}
.required input[type="checkbox"] {
    accent-color: gray;
}

.Qcard {
    display : flex;
    width: 100%;
    margin: 0 auto;
   
    border: 1px solid rgb(235,235,235);
    background: white;
    flex-direction: column;
    border-radius: 4px;
    margin-top: 0px;
    transition: transform 150ms ease;
}

.dragHandle {
    display: flex;
    flex-direction: column;
    gap: 4px;
    cursor: grab;  
}

.dragHandle span {
    width: 18px;
    height: 2px;
    background: grey;
    border-radius: 2px;
}
.dragHandle:hover span {
    background: #444;
}


.dragHandle:active {
    cursor: grabbing;
}
.dragging {
    background: #f5f5f5;
    opacity: .4;
}
.chosen {
    transform: scale(1.03);
    box-shadow: 0 8px 24px rgba(0,0,0,.18);
}

</style>

</html>
